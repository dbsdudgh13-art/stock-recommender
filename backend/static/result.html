<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>조합 종목 · 방향성</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
</style>
</head>
<body class="min-h-screen" style="background: radial-gradient(1200px 500px at 50% -10%, #eef2ff, #f8fafc);">
  <div class="max-w-2xl mx-auto px-4 py-10">
    <a href="/static/index.html" class="text-sm text-indigo-600 hover:underline">← 검색으로 돌아가기</a>
    <div id="content" class="mt-4">
      <div class="text-sm text-slate-400">불러오는 중...</div>
    </div>

    <footer class="mt-12 pt-6 border-t border-slate-200 text-xs text-slate-400">
      <div class="flex flex-wrap gap-x-4 gap-y-2">
        <a href="/static/blog.html" class="hover:underline">오늘의 시황</a>
        <a href="/static/about.html" class="hover:underline">소개 · 문의</a>
        <a href="/static/privacy.html" class="hover:underline">개인정보처리방침</a>
        <a href="/static/terms.html" class="hover:underline">이용약관</a>
      </div>
      <p class="mt-3 leading-relaxed">스톡메이트(StockMate) · 대표 윤영빈 · 사업자등록번호 218-26-70937 · 문의 opedband@naver.com</p>
    </footer>
  </div>

<script>
  const AVATAR_PALETTE = [
    ["#6366f1", "#a5b4fc"], ["#ec4899", "#f9a8d4"], ["#0ea5e9", "#7dd3fc"], ["#10b981", "#6ee7b7"],
    ["#f59e0b", "#fcd34d"], ["#8b5cf6", "#c4b5fd"], ["#ef4444", "#fca5a5"], ["#14b8a6", "#5eead4"],
  ];
  function hashString(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) { hash = (hash << 5) - hash + str.charCodeAt(i); hash |= 0; }
    return Math.abs(hash);
  }
  function avatarHtml(name, code) {
    const [from, to] = AVATAR_PALETTE[hashString(code) % AVATAR_PALETTE.length];
    return `<div class="shrink-0 w-12 h-12 rounded-2xl flex items-center justify-center text-white font-bold text-sm shadow-sm"
      style="background: linear-gradient(135deg, ${from}, ${to});">${name.slice(0, 2)}</div>`;
  }
  function corrBar(correlation) {
    const pct = Math.min(100, Math.abs(correlation) * 100);
    const color = correlation >= 0.6 ? "#ef4444" : correlation >= 0.3 ? "#f59e0b" : "#10b981";
    return `
      <div class="flex-1 min-w-[40px] h-1.5 rounded-full bg-slate-100 overflow-hidden">
        <div class="h-full rounded-full" style="width:${pct}%; background:${color};"></div>
      </div>`;
  }
  function scoreBadge(score) {
    const label = score >= 70 ? "강한 동조" : score >= 50 ? "뚜렷한 동조" : "약한 동조";
    const bg = score >= 70 ? "#fef2f2" : score >= 50 ? "#fffbeb" : "#f0fdf4";
    const fg = score >= 70 ? "#dc2626" : score >= 50 ? "#d97706" : "#16a34a";
    return `<span class="text-[11px] font-bold px-2 py-1 rounded-full shrink-0"
      style="background:${bg}; color:${fg};">수혜 점수 ${score} · ${label}</span>`;
  }
  function trendIcon(label) {
    if (label === "상승") return "📈";
    if (label === "하락") return "📉";
    return "➡️";
  }
  function trendLabelOf(change) {
    if (change === null || change === undefined) return "-";
    if (change > 2) return "상승";
    if (change < -2) return "하락";
    return "횡보";
  }

  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const sessionId = params.get("session_id");
  const content = document.getElementById("content");

  async function load() {
    const res = await fetch(`/api/combo/${code}?session_id=${encodeURIComponent(sessionId)}`);
    if (res.status === 402) {
      content.innerHTML = `<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 text-sm text-red-500">결제가 확인되지 않았습니다. 검색 페이지에서 다시 시도해 주세요.</div>`;
      return;
    }
    if (!res.ok) {
      content.innerHTML = `<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 text-sm text-red-500">결과를 불러오지 못했습니다.</div>`;
      return;
    }
    const data = await res.json();
    render(data);
  }

  function render(data) {
    const { stock, combo, direction } = data;
    const shortLabel = trendLabelOf(direction.short_term_change_pct);

    content.innerHTML = `
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-4 flex items-center gap-4">
        ${avatarHtml(stock.name, stock.code)}
        <div class="flex-1 min-w-0">
          <h1 class="text-xl font-bold text-slate-900 truncate">${stock.name} <span class="text-sm text-slate-400 font-normal">${stock.code}</span></h1>
          <p class="text-xs text-slate-500 mt-1 truncate">🏷️ ${stock.industry ?? "-"}</p>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-4">
        <h2 class="font-bold text-slate-800 mb-1">🚀 함께 오르는 종목 (수혜주)</h2>
        <p class="text-xs text-slate-400 mb-3">최근 6개월간 ${stock.name} 상승일의 동반 상승 이력을 분석한 결과입니다</p>
        ${
          combo.length === 0
            ? `<div class="text-sm text-slate-400">함께 움직이는 종목을 찾지 못했습니다 (가격 데이터 부족 또는 양의 상관관계 없음).</div>`
            : combo
                .map(
                  (c) => `
              <div class="border-b border-slate-100 last:border-0 py-4">
                <div class="flex gap-3">
                  ${avatarHtml(c.name, c.code)}
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between gap-2">
                      <div class="flex items-baseline gap-1.5 min-w-0">
                        <span class="text-sm font-medium text-slate-800 truncate">${c.name}</span>
                        <span class="text-slate-400 text-xs shrink-0">${c.code}</span>
                      </div>
                      ${scoreBadge(c.score)}
                    </div>
                    <p class="text-xs text-slate-600 leading-relaxed mt-1.5">${c.reason}</p>
                  </div>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-3">
                  <div class="bg-slate-50 rounded-xl px-3 py-2">
                    <div class="text-[10px] text-slate-400">동반 상승 확률</div>
                    <div class="text-sm font-bold text-slate-800">${(c.hit_rate * 100).toFixed(0)}%</div>
                  </div>
                  <div class="bg-slate-50 rounded-xl px-3 py-2">
                    <div class="text-[10px] text-slate-400">상승 민감도</div>
                    <div class="text-sm font-bold text-slate-800">${(c.upside_capture * 100).toFixed(0)}%</div>
                  </div>
                  <div class="bg-slate-50 rounded-xl px-3 py-2">
                    <div class="text-[10px] text-slate-400">상관계수</div>
                    <div class="text-sm font-bold text-slate-800">${c.correlation}</div>
                  </div>
                </div>
              </div>`
                )
                .join("")
        }
        <p class="text-[11px] text-slate-400 mt-3 leading-relaxed">
          * 동반 상승 확률: ${stock.name} 상승일 중 해당 종목도 함께 오른 날의 비율 ·
          상승 민감도: 그런 날 ${stock.name} 상승분 대비 해당 종목의 평균 상승 폭 ·
          수혜 점수: 두 지표와 상관계수를 합성한 0~100점 지표
        </p>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-4">
        <h2 class="font-bold text-slate-800 mb-2">${trendIcon(shortLabel)} '${direction.industry}' 분야 방향성</h2>
        <p class="text-sm text-slate-700 leading-relaxed">${direction.summary}</p>
      </div>

      <div class="text-xs text-slate-400 bg-slate-100/80 rounded-xl p-3">⚠️ ${direction.disclaimer}</div>
    `;
  }

  load();
</script>
</body>
</html>
