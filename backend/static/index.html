<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

</style>

<body class="min-h-screen" style="background: radial-gradient(1200px 500px at 50% -10%, #eef2ff, #f8fafc);">
  <div class="max-w-3xl mx-auto px-4 py-10">
    <div class="mb-8">
      <div class="flex items-center gap-2 mb-3">
        <span class="inline-flex items-center gap-2 bg-indigo-600/10 text-indigo-700 text-xs font-semibold px-3 py-1 rounded-full">📈 국내 코스피 · 코스닥</span>
        <span class="text-xs font-bold text-indigo-600 tracking-wide">STOCKMATE 스톡메이트</span>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">종목 유사·동조 통계 분석</h1>
      <p class="text-sm text-slate-500 leading-relaxed">종목을 검색하면 같은 분야의 유사 종목과<br/>
        과거 주가가 함께 오른 종목 통계·업종 추이 데이터를 무료로 확인할 수 있습니다.</p>
    </div>

    <div class="bg-white/90 backdrop-blur rounded-2xl shadow-lg shadow-indigo-100 border border-white p-5 space-y-4">
      <div class="flex gap-2">
        <input id="q" type="text" placeholder="종목명 또는 코드 (예: 삼성전자, 005930)"
          class="flex-1 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
        <button id="searchBtn" class="bg-indigo-600 text-white font-medium px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition">검색</button>
      </div>
      <p class="text-xs text-slate-400">ℹ️ 코스피·코스닥 <strong>개별 주식</strong>만 지원합니다. ETF·리츠·선물 등은 제외됩니다.</p>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div>
          <label class="block text-xs text-slate-500 mb-1">💰 최소 가격(원)</label>
          <input id="minPrice" type="number" min="0" placeholder="0"
            class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">💰 최대 가격(원)</label>
          <input id="maxPrice" type="number" min="0" placeholder="제한 없음"
            class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">🏷️ 분야(업종) 필터</label>
          <select id="industry" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm">
            <option value="">전체</option>
          </select>
        </div>
      </div>
    </div>

    <div id="results" class="mt-6 space-y-3"></div>
    <div id="similarPanel" class="mt-6"></div>

    <footer class="mt-12 pt-6 border-t border-slate-200 text-xs text-slate-400">
      <div class="flex flex-wrap gap-x-4 gap-y-2">
        <a href="/static/blog.html" class="hover:underline">오늘의 시황</a>
        <a href="/static/about.html" class="hover:underline">소개 · 문의</a>
        <a href="/static/privacy.html" class="hover:underline">개인정보처리방침</a>
        <a href="/static/terms.html" class="hover:underline">이용약관</a>
      </div>
      <p class="mt-3 leading-relaxed">스톡메이트(StockMate) · 문의 opedband@naver.com</p>
    </footer>
  </div>

<script src="/static/app.js?v=6"></script>
</body>
</html>
